<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- PWA Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Viewport & Theme -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#E23744" />
    <meta name="background-color" content="#0F0F1A" />

    <!-- iOS PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FoodDash" />

    <!-- Android PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="FoodDash" />

    <!-- SEO -->
    <meta name="description" content="FoodDash — Order delicious food from the best restaurants near you. Fast delivery, live tracking, and premium dining experience." />
    <meta name="keywords" content="food delivery, restaurant, order food online, fast food, FoodDash" />

    <!-- Open Graph (for sharing links) -->
    <meta property="og:title" content="FoodDash — Delicious Food, Delivered Fast" />
    <meta property="og:description" content="Order from the best restaurants near you with live GPS tracking." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icon-512.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <title>FoodDash — Delicious Food, Delivered Fast</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Cache buster: clears stale PWA caches that may serve old JS bundles -->
    <script>
      if ('serviceWorker' in navigator) {
        // Unregister all old service workers and clear all caches
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for (let registration of registrations) {
            registration.unregister();
          }
        });
        caches.keys().then(function(cacheNames) {
          cacheNames.forEach(function(cacheName) {
            caches.delete(cacheName);
          });
        });
      }
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
